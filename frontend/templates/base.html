{% load static %}
<!doctype html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{% static 'stickymobile/styles/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'stickymobile/styles/style.css' %}">
    <link rel="stylesheet" class="page-highlight"
          href="{% static 'stickymobile/styles/highlights/highlight_red.css' %}">
    <link rel="manifest" href="{% static 'stickymobile/_manifest.json' %}">

    {% block extra_head %}{% endblock %}
</head>

<body class="theme-light" data-background="none" data-highlight="red2">

<div id="page">

    <div class="page-content header-clear-large">
        {% block content %}{% endblock %}
    </div>

</div>
{% block extra_js %}{% endblock %}
</body>
</html>
