{% extends 'base.html' %}
{% block title %}New Story{% endblock %}
{% block header %}Create Story{% endblock %}

{% block content %}
<form action="" method="post" id="storyForm" class="needs-validation" novalidate>
    {% csrf_token %}

    <!-- Title -->
    <div class="mb-3">
        <label for="id_title" class="form-label">Story title</label>
        <input type="text" class="form-control" name="title" id="id_title"
               required minlength="3" maxlength="255"
               placeholder="The Brave Little Fox">
        <div class="invalid-feedback">Please provide a title (at least 3 characters).</div>
    </div>

    <!-- Short description -->
    <div class="mb-3">
        <label for="id_description" class="form-label">Short description</label>
        <textarea class="form-control" name="description" id="id_description"
                  rows="2" maxlength="500"
                  placeholder="A bedtime tale about…"></textarea>
    </div>

    <!-- Main character helper (optional) -->
    <div class="mb-3">
        <label for="id_main_character" class="form-label">Main character</label>
        <input type="text" class="form-control" name="main_character"
               id="id_main_character" placeholder="A shy dragon">
    </div>

    <!-- Length slider -->
    <div class="mb-3">
        <label for="id_duration" class="form-label">
            Length (minutes): <span id="durOut" class="fw-semibold">5</span>
        </label>
        <input type="range" class="form-range" name="duration" id="id_duration"
               min="2" max="15" value="5" step="1"
               oninput="durOut.textContent = this.value">
    </div>

    <!-- Language -->
    <div class="mb-3">
        <label for="id_language" class="form-label">Language</label>
        <select class="form-select" name="language" id="id_language">
            <option value="fr-FR">French (fr-FR)</option>
            <option value="en-US">English (en-US)</option>
            <option value="es-ES">Spanish (es-ES)</option>
        </select>
    </div>

    <!-- Age range -->
    <div class="mb-3">
        <label for="id_age_range" class="form-label">Age range</label>
        <select class="form-select" name="age_range" id="id_age_range">
            <option value="0-3">0–3 years</option>
            <option value="4-6">4–6 years</option>
            <option value="7-9">7–9 years</option>
            <option value="10-12">10–12 years</option>
            <option value="13+">13 + years</option>
        </select>
    </div>

    <!-- Visibility -->
    <div class="mb-3">
        <label for="id_visibility" class="form-label">Visibility</label>
        <select class="form-select" name="visibility" id="id_visibility">
            <option value="public">Public</option>
            <option value="tenant_only" selected>Tenant only</option>
            <option value="private">Private</option>
        </select>
    </div>

    <!-- Publish now -->
    <div class="form-check form-switch mb-4">
        <input class="form-check-input" type="checkbox" role="switch"
               id="id_is_published" name="is_published">
        <label class="form-check-label" for="id_is_published">
            Publish immediately
        </label>
    </div>

    <!-- Submit -->
    <button type="submit"
            class="btn btn-primary w-100 d-flex justify-content-center align-items-center"
            id="submitBtn">
        <span class="spinner-border spinner-border-sm me-2 d-none"
              role="status" aria-hidden="true"></span>
        <span>Generate Story</span>
    </button>
</form>

<!-- Client-side validation & spinner -->
<script>
    (function () {
        const form = document.getElementById('storyForm');
        const btn  = document.getElementById('submitBtn');
        const spin = btn.querySelector('.spinner-border');

        form.addEventListener('submit', function (e) {
            if (!form.checkValidity()) {
                e.preventDefault();
                form.classList.add('was-validated');
            } else {
                // show spinner and lock button
                spin.classList.remove('d-none');
                btn.setAttribute('disabled', 'disabled');
            }
        });
    })();
</script>
{% endblock %}
