{% extends "base.html" %}

{% block title %}Stories - Talemo{% endblock %}

{% block content %}
<div class="container">
    <h1>Stories</h1>
    {% if stories %}
        <ul>
        {% for story in stories %}
            <li>{{ story.title }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No stories available.</p>
    {% endif %}
</div>
{% endblock %}
