version: '3.8'

services:
  # Elasticsearch for log storage and search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: talemo-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Logstash for log processing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    container_name: talemo-logstash
    depends_on:
      - elasticsearch
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    ports:
      - "5044:5044"
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: talemo-kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

  # APM Server for application performance monitoring
  apm-server:
    image: docker.elastic.co/apm/apm-server:8.11.1
    container_name: talemo-apm-server
    depends_on:
      - elasticsearch
      - kibana
    ports:
      - "8200:8200"
    environment:
      - output.elasticsearch.hosts=["elasticsearch:9200"]
    volumes:
      - ./apm-server/apm-server.yml:/usr/share/apm-server/apm-server.yml

  # StatsD for metrics collection
  statsd:
    image: prom/statsd-exporter:latest
    container_name: talemo-statsd
    ports:
      - "9102:9102"
      - "9125:9125/udp"
    command: "--statsd.mapping-config=/etc/statsd/statsd-mapping.yml"
    volumes:
      - ./statsd/statsd-mapping.yml:/etc/statsd/statsd-mapping.yml

  # Prometheus for metrics storage
  prometheus:
    image: prom/prometheus:latest
    container_name: talemo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - statsd

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: talemo-grafana
    depends_on:
      - prometheus
      - elasticsearch
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

volumes:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
