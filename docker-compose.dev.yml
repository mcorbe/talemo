version: '3.8'

services:
  # PostgreSQL with pgvector extension
  db:
    image: ankane/pgvector:latest
    container_name: talemo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-talemo}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Web Server
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: talemo-web
    restart: unless-stopped
    depends_on:
      - db
      - redis
      - minio
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-7dbq8%y^m^u6na#nxpza1@*j=lhnp(++-ccuw)3uem5j969-$2}
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - DB_NAME=${DB_NAME:-talemo}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_BUCKET=${MINIO_BUCKET:-talemo}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STABILITY_API_KEY=${STABILITY_API_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      bash -c "python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"

  # Redis for caching and message broker
  redis:
    image: redis:7-alpine
    container_name: talemo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # MinIO for object storage
  minio:
    image: minio/minio:latest
    container_name: talemo-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Celery worker for asynchronous tasks
  celery:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: talemo-celery
    restart: unless-stopped
    depends_on:
      - redis
      - db
    environment:
      - DEBUG=True
      - DB_NAME=${DB_NAME:-talemo}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_BUCKET=${MINIO_BUCKET:-talemo}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STABILITY_API_KEY=${STABILITY_API_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    volumes:
      - .:/app
    command: celery -A config worker -l info

  # Celery Beat for scheduled tasks
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: talemo-celery-beat
    restart: unless-stopped
    depends_on:
      - redis
      - db
      - celery
    environment:
      - DEBUG=True
      - DB_NAME=${DB_NAME:-talemo}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    command: celery -A config beat -l info

  # Flower for Celery monitoring
  flower:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: talemo-flower
    restart: unless-stopped
    depends_on:
      - redis
      - celery
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    command: celery -A config flower --port=5555

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: talemo-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data:
  minio_data: